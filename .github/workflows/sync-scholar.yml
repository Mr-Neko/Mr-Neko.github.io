name: Sync Google Scholar Stats

on:
  schedule:
    # Daily at 01:00 UTC (09:00 Beijing time)
    - cron: '0 1 * * *'
  workflow_dispatch:  # allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scholar sync
        run: python scripts/sync_scholar_stats.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scholar_stats.json
          if git diff --cached --quiet; then
            echo "No citation changes today."
          else
            git commit -m "chore: daily scholar stats sync [skip ci]"
            git push
          fi
